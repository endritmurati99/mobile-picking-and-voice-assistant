<text x="58" y="840" font-size="18" font-weight="700" fill="#1f2937">Architekturregeln / Risiko-Grenzen</text>
<text x="58" y="865" font-size="13" fill="#4b5563">1. Odoo bleibt System of Record. 2. FastAPI ist die einzige App-API für die PWA. 3. n8n liegt nicht im normalen Voice-Hot-Path. 4. n8n schreibt</text>
<text x="58" y="883" font-size="13" fill="#4b5563">fachlich nur über interne FastAPI-Callbacks zurück. 5. Touch bleibt Fallback; Voice darf Picking nicht blockieren.</text>
