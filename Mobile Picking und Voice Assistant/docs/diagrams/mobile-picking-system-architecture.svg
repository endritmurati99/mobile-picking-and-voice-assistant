<rect x="40" y="860" width="1600" height="82" rx="18" fill="#ffffff" stroke="#111827" stroke-width="2"/>
<text x="58" y="892.0" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033" text-anchor="start">Pfeile</text>
<text x="58" y="921.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Blau = Hot Path / Benutzeraktion · Grün = kontrollierter fachlicher Write/Callback · Magenta gestrichelt = n8n-Orchestrierung · Dunkelgrau = Datenbankpersistenz · Orange</text>
<text x="58" y="936.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">gestrichelt = Fallback/Degradation</text>
<rect x="40" y="970" width="485" height="135" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="58" y="1004.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Picking-Bestätigung</text>
<text x="58" y="1031.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">PWA → FastAPI `/confirm-line` → Claim/Idempotency-Prüfung</text>
<text x="58" y="1046.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">→ Odoo-Write → asynchrones `pick-confirmed` an n8n.</text>
<text x="58" y="1062.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Picking bleibt fachlich gültig, auch wenn n8n degradiert.</text>
<rect x="598" y="970" width="485" height="135" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="616" y="1004.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Voice &amp; Ausnahmeassistenz</text>
<text x="616" y="1031.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Normal: PWA → FastAPI → Whisper → lokale Intent-Logik →</text>
<text x="616" y="1046.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">PWA. Ausnahme: `/voice/assist` reichert Kontext an und</text>
<text x="616" y="1062.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">fragt n8n synchron mit lokalem Fallback.</text>
<rect x="1155" y="970" width="485" height="135" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="1173" y="1004.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Quality Alert / Welle A</text>
<text x="1173" y="1031.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">FastAPI erstellt Alert zuerst in Odoo. Bei n8n-Erfolg wird</text>
<text x="1173" y="1046.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">`pending` gesetzt; bei Dispatch-Fehler greift lokaler</text>
<text x="1173" y="1062.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Fallback. n8n schreibt kontrolliert über FastAPI zurück.</text>
<rect x="40" y="1135" width="1600" height="105" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="58" y="1169.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Architekturregeln</text>
<text x="58" y="1196.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo bleibt System of Record · FastAPI ist die einzige App-API · n8n liegt nicht im normalen Voice-Hot-Path · n8n schreibt fachlich nur über FastAPI zurück.</text>
<text x="58" y="1211.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Touch bleibt Fallback; Voice ist Enhancement.</text>
</svg>