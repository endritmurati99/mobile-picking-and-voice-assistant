<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1280" viewBox="0 0 1680 1280">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#303846"/></marker></defs>
<rect width="1680" height="1280" fill="#ffffff"/>
<rect x="40" y="30" width="1600" height="102" rx="18" fill="#fff" stroke="#111827" stroke-width="2"/>
<text x="58" y="71.0" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#172033" text-anchor="start">Mobile Picking &amp; Voice Assistant – Systemarchitektur</text>
<text x="58" y="92.0" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#52606d" text-anchor="start">PoC für mobile Lagerarbeit: PWA als Bedienoberfläche, FastAPI als kontrollierte App-Schicht, Odoo als fachliche Wahrheit, lokale Spracherkennung und</text>
<text x="58" y="108.8" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#52606d" text-anchor="start">n8n für Folgeprozesse.</text>
<rect x="40" y="145" width="330" height="760" rx="18" fill="#fff7d6" stroke="#f08c00" stroke-width="2"/>
<text x="58" y="179.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">1 · Mobile / Lagerfläche</text>
<text x="58" y="206.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Picker arbeitet in der PWA. Scan und</text>
<text x="58" y="221.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Touch bleiben robuste Rückfallebene;</text>
<text x="58" y="237.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Voice beschleunigt, blockiert aber</text>
<text x="58" y="252.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">keinen Prozess.</text>
<rect x="410" y="145" width="390" height="760" rx="18" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
<text x="428" y="179.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">2 · App-Schicht / Hot Path</text>
<text x="428" y="206.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Caddy und FastAPI trennen die mobile App von</text>
<text x="428" y="221.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo, n8n, Whisper und Infrastrukturdetails.</text>
<rect x="840" y="145" width="390" height="760" rx="18" fill="#f3f0ff" stroke="#6741d9" stroke-width="2"/>
<text x="858" y="179.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">3 · Fachlicher Kern</text>
<text x="858" y="206.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo hält Stammdaten, Pickings, Quality</text>
<text x="858" y="221.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Alerts, Nutzer, Lagerplätze, Chatter und KI-</text>
<text x="858" y="237.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Felder.</text>
<rect x="1270" y="145" width="370" height="760" rx="18" fill="#fff0f6" stroke="#c2255c" stroke-width="2"/>
<text x="1288" y="179.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">4 · Orchestrierung / Ränder</text>
<text x="1288" y="206.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">n8n verarbeitet Folgeprozesse,</text>
<text x="1288" y="221.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Ausnahmeassistenz und externe</text>
<text x="1288" y="237.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Integrationen.</text>
<rect x="80" y="245" width="250" height="120" rx="18" fill="#fff9db" stroke="#f08c00" stroke-width="2"/>
