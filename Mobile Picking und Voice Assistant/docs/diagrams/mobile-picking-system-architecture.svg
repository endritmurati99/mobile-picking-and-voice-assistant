<text x="98" y="453.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Geräte-APIs</text>
<text x="98" y="481.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Kamera/Scanner · Mikrofon ·</text>
<text x="98" y="496.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Browser Storage · PWA Cache</text>
<rect x="80" y="610" width="250" height="105" rx="18" fill="#fff9db" stroke="#f08c00" stroke-width="2"/>
<text x="98" y="643.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Operative Fallbacks</text>
<text x="98" y="671.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Touch-Bestätigung · manuelle</text>
<text x="98" y="686.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Kurzmenge · Alert ohne Voice ·</text>
<text x="98" y="702.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Degradation sichtbar</text>
<rect x="455" y="230" width="300" height="95" rx="18" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
