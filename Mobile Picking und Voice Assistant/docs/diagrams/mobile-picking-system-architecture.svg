<text x="473" y="291.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">HTTPS/LAN-Domain · statische PWA ·</text>
<text x="473" y="306.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">API-Routing</text>
<rect x="455" y="380" width="300" height="190" rx="18" fill="#d3f9d8" stroke="#099268" stroke-width="2"/>
<text x="473" y="414.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">FastAPI Backend</text>
<text x="473" y="441.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">einzige App-API · Picker/Auth-</text>
<text x="473" y="456.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Kontext · Claiming · Idempotency ·</text>
<text x="473" y="472.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo-Adapter · n8n-Client ·</text>
<text x="473" y="487.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Integrationslog · Circuit Breaker</text>
<rect x="455" y="635" width="300" height="115" rx="18" fill="#e7f5ff" stroke="#1971c2" stroke-width="2"/>
<text x="473" y="669.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Lokaler Whisper ASR</text>
<text x="473" y="696.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">/api/voice/recognize · deutsches</text>
<text x="473" y="711.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">faster-whisper Modell · bleibt im</text>
<text x="473" y="727.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">normalen Voice-Hot-Path lokal</text>
<rect x="885" y="230" width="300" height="150" rx="18" fill="#f3f0ff" stroke="#6741d9" stroke-width="2"/>
<text x="903" y="264.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">Odoo 18 Community</text>
<text x="903" y="291.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">System of Record: Stock Pickings ·</text>
<text x="903" y="306.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Quality Alerts · Nutzer ·</text>
<text x="903" y="322.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Lagerplätze · Chatter ·</text>
<text x="903" y="337.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">strukturierte KI-Felder</text>
<rect x="885" y="455" width="300" height="115" rx="18" fill="#f3f0ff" stroke="#6741d9" stroke-width="2"/>
<text x="903" y="488.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">PostgreSQL</text>
<text x="903" y="516.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Odoo-Datenbank und n8n-Datenbank im</text>
<text x="903" y="531.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Compose-Netz. Persistenz liegt nicht</text>
<text x="903" y="547.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">in der PWA.</text>
<rect x="885" y="650" width="300" height="100" rx="18" fill="#f3f0ff" stroke="#6741d9" stroke-width="2"/>
<text x="903" y="683.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Obsidian Kontext</text>
<text x="903" y="711.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Optionale Wissensanreicherung für</text>
<text x="903" y="726.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Ausnahmeassistenz, nicht Teil des</text>
<text x="903" y="742.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Picking-Hot-Path.</text>
<rect x="1315" y="245" width="285" height="170" rx="18" fill="#fff0f6" stroke="#c2255c" stroke-width="2"/>
<text x="1333" y="279.0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#172033" text-anchor="start">n8n Orchestrator</text>
<text x="1333" y="306.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Workflows: pick-confirmed</text>
<text x="1333" y="321.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">· shortage-reported ·</text>
<text x="1333" y="337.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">quality-alert-created ·</text>
<text x="1333" y="352.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">voice-exception-query ·</text>
<text x="1333" y="368.4" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">quality-assessment</text>
<rect x="1315" y="485" width="285" height="125" rx="18" fill="#f8f9fa" stroke="#868e96" stroke-width="2"/>
<text x="1333" y="518.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Externe Kanäle</text>
<text x="1333" y="546.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Cloudflare Tunnel ·</text>
<text x="1333" y="561.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Mailpit/E-Mail · optional</text>
<text x="1333" y="577.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">OpenAI nur für definierte</text>
<text x="1333" y="592.8" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">KI-Schritte</text>
<rect x="1315" y="690" width="285" height="120" rx="18" fill="#fff5f5" stroke="#e03131" stroke-width="2"/>
<text x="1333" y="723.0" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#172033" text-anchor="start">Sicherheitsgrenzen</text>
<text x="1333" y="751.0" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Secrets in Env · interne</text>
<text x="1333" y="766.6" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">Callback-Secrets · n8n</text>
<text x="1333" y="782.2" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="#52606d" text-anchor="start">ohne direkte Odoo-Writes</text>
